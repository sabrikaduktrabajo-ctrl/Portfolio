<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabrina Kaduk | Gerente de Marketing de Crecimiento y Rendimiento</title>
<link href=" https://fonts. googleapis.com/css2?family= Plus+Jakarta+Sans:wght@300; 400;600;700&display=swap " rel="stylesheet">
<style>
:root {
--bg-color: #0b0f19;
--card-bg: #161b26;
--accent-color: #38bdf8;
--text-main: #f3f4f6;
--text-muted: #9ca3af;
}

body {
font-family: 'Plus Jakarta Sans', sans-serif;
background-color: var(--bg-color);
color: var(--text-main);
margin: 0;
padding: 0;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}

.portfolio-card {
background-color: var(--card-bg);
border: 1px solid #232d3f;
border-radius: 24px;
padding: 40px;
max-width: 550px;
width: 90%;
box-shadow: 0 20px 40px rgba(0,0,0,0.3);
text-align: center;
}

.profile-img {
width: 110px;
height: 110px;
background: linear-gradient(135deg, #38bdf8, #818cf8);
border-radius: 50%;
margen: 0 auto 20px;
mostrar: flex;
alinear-elementos: centro;
justificar-contenido: centro;
tamaño-fuente: 2.5rem;
peso-fuente: 700;
color: #0b0f19;
}

h1 {
tamaño-fuente: 1.8rem;
margen: 0 0 8px 0;
espaciado-letra: -0.5px;
}

.subtítulo {
color: var(--color-de-acento);
tamaño-fuente: 1rem;
peso-fuente: 600;
margen-inferior: 24px;
transformación-texto: mayúsculas;
espaciado-letra: 1px;
}

.contenedor-métrico {
mostrar: cuadrícula;
columnas-plantilla-cuadrícula: 1fr 1fr;
espacio:16px;
margen inferior: 32px;
}

.metric-box {
background-color: #1f2736;
padding: 16px;
border-radius: 16px;
border: 1px solid #2d3748;
}

.metric-title {
font-size: 0.8rem;
color: var(--text-muted);
text-transform: uppercase;
margin-bottom: 4px;
}

.metric-value {
font-size: 1.4rem;
font-weight: 700;
color: #fff;
}

.btn-primary {
display: block;
background-color: var(--accent-color);
color: #0b0f19;
text-decoration: none;
padding: 14px;
border-radius: 12px;
font-weight: 700;
margin-bottom: 12px;
transition: opacity 0.2s;
}

.btn-primary:hover {
opacity: 0.9;
}

.btn-secondary {
display: block;
background-color: transparent;
color: var(--text-main);
text-decoration: none;
padding: 14px;
border-radius: 12px;
font-weight: 600;
border: 1px solid #374151;
transition: background 0.2s;
}

.btn-secondary:hover {
background-color: #1f2736;
}

footer {
margin-top: 32px;
font-size: 0.85rem;
color:var(--text-muted);
}
</style>
</head>
<body>

<div class="portfolio-card">
<div class="profile-img">SK</div>
<h1>Sabrina Kaduk</h1>
<div class="subtitle">Gerente de Marketing de Crecimiento y Rendimiento</div>

<div class="metrics-container">
<div class="metric-box">
<div class="metric-title"> Especialidad</div>
<div class="metric-value"> Optimización ROAS</div>
</div>
<div class="metric-box">
<div class="metric-title">Enfoque Core</div>
<div class="metric-value"> Escalabilidad CLV</div>
</div>
</div>

<a href=" https://linkedin.com/in/sabrina-kaduk " target="_blank" class="btn-primary">Conectar en LinkedIn</a>
<a href="mailto: sabri.kaduk. trabajo@gmail.com " class="btn-secondary">Enviar Correo Electrónico</a>

<footer>
© 2026 • Diseñado para Impacto y Rendimiento
</footer>
</div>

</body>
</html>
